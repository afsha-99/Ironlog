// ── localStorage helpers (VS Code / browser compatible) ──────────────────────
async function loadData(key) {
  try {
    const r = localStorage.getItem(key);
    return r ? JSON.parse(r) : null;
  } catch { return null; }
}
async function saveData(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
  } catch {}
}


// ── Utilities ────────────────────────────────────────────────────────────────
function formatDate(d) {
  return new Date(d).toLocaleDateString(undefined, { weekday:"short", day:"2-digit", month:"short", year:"numeric" });
}

function cleanSets(sets) {
  return sets
    .filter(s => s.weight !== "" && s.reps !== "")
    .map(s => ({ weight: Number(s.weight), reps: parseInt(s.reps, 10) }))
    .filter(s => isFinite(s.weight) && isFinite(s.reps) && s.reps > 0 && s.weight >= 0);
}

function setStats(sets = []) {
  return {
    maxWeight: Math.max(0, ...sets.map(s => Number(s.weight) || 0)),
    totalReps: sets.reduce((a, s) => a + (Number(s.reps) || 0), 0),
    totalSets: sets.length,
    totalVolume: sets.reduce((a, s) => a + ((Number(s.weight) || 0) * (Number(s.reps) || 0)), 0),
  };
}

function getProgressWarning(logs, deviceId) {
  // Only used for small warning icons in history. The real popup is triggered after saving.
  const rel = logs.filter(l => l.deviceId === deviceId)
    .sort((a,b) => new Date(b.date)-new Date(a.date));
  if (rel.length < 2) return false;
  return getProgressWarningForLog(rel.slice(1), rel[0]);
}

function getProgressWarningForLog(logs, currentLog) {
  const previous = logs
    .filter(l => l.deviceId === currentLog.deviceId && l.id !== currentLog.id)
    .sort((a,b) => new Date(b.date)-new Date(a.date))[0];

  if (!previous) return false;

  const diffDays = Math.abs((new Date(currentLog.date) - new Date(previous.date)) / (1000 * 60 * 60 * 24));
  if (diffDays > 14) return false;

  const current = setStats(currentLog.sets);
  const old = setStats(previous.sets);

  const improved =
    current.totalVolume > old.totalVolume ||
    current.maxWeight > old.maxWeight ||
    current.totalReps > old.totalReps ||
    current.totalSets > old.totalSets;

  return !improved;
}

function exitIronLog() {
  try {
    if (window.history.length > 1) { window.history.back(); return; }
  } catch {}
  try { window.close(); } catch {}
  setTimeout(() => {
    try { window.location.href = 'shortcuts://'; } catch {}
  }, 120);
}

function ExitButton() {
  return (
    <button onClick={exitIronLog} style={{
      position:'fixed', top:'calc(env(safe-area-inset-top, 0px) + 10px)', left:12, zIndex:9999,
      background:'rgba(15,23,42,0.88)', color:'#f8fafc', border:'1px solid #334155',
      borderRadius:999, padding:'9px 13px', fontSize:13, fontWeight:800,
      boxShadow:'0 8px 24px rgba(0,0,0,0.35)', backdropFilter:'blur(10px)',
      cursor:'pointer', fontFamily:'inherit'
    }}>← Exit</button>
  );
}

function SplashScreen({ onStart }) {
  return (
    <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"flex-end",position:"relative",overflow:"hidden"}}>

      <img src={ARNOLD_IMG} alt="Arnold"
        style={{position:"absolute",inset:0,width:"100%",height:"100%",
          objectFit:"cover",objectPosition:"top center",
          filter:"sepia(15%) contrast(1.05) brightness(0.8)"}} />

      <div style={{position:"absolute",inset:0,
        background:"linear-gradient(to bottom,transparent 0%,transparent 45%,rgba(0,0,0,0.78) 70%,rgba(0,0,0,0.97) 100%)"}} />

      <div style={{position:"absolute",inset:0,
        background:"radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.45) 100%)"}} />

      <div style={{position:"relative",zIndex:2,width:"100%",maxWidth:430,
        padding:"0 28px 44px",display:"flex",flexDirection:"column",gap:10}}>
        <div style={{fontSize:11,fontWeight:800,letterSpacing:6,color:"#f59e0b",textTransform:"uppercase",marginBottom:2}}>
          Gym Tracker
        </div>
        <div style={{fontSize:62,fontWeight:900,color:"#f8fafc",lineHeight:0.88,letterSpacing:-3,textShadow:"0 4px 32px rgba(0,0,0,1)"}}>
          IRON<br/>LOG
        </div>
        <div style={{color:"#a8a29e",fontSize:13,lineHeight:1.6,marginBottom:6}}>
          Track every set. Beat every session.<br/>Progressive overload made simple.
        </div>
        <button onClick={onStart} style={{width:"100%",borderRadius:999,
          border:"2px solid rgba(251,191,36,0.9)",
          background:"linear-gradient(135deg,#f59e0b,#d97706)",
          color:"#000",fontSize:20,fontWeight:900,letterSpacing:5,padding:"20px",
          cursor:"pointer",boxShadow:"0 10px 40px rgba(245,158,11,0.4)"}}>
          START
        </button>
        <div style={{color:"#57534e",fontSize:10,textAlign:"center",marginTop:2}}>
          Arnold Schwarzenegger — The Education of a Bodybuilder
        </div>
      </div>
    </div>
  );
}

// IMAGE CROPPER
// ═══════════════════════════════════════════════════════════════
function ImageCropper({ src, onCrop, onCancel }) {
  const [zoom, setZoom] = useState(1);
  const [ox, setOx] = useState(0);
  const [oy, setOy] = useState(0);
  const [busy, setBusy] = useState(false);

  const doCrop = async () => {
    setBusy(true);
    try {
      const img = new Image();
      img.crossOrigin = "anonymous";
      await new Promise((res,rej)=>{ img.onload=res; img.onerror=rej; img.src=src; });
      const size = 700;
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext("2d");
      const base = Math.max(size/img.width, size/img.height);
      const scale = base * zoom;
      const dw = img.width*scale, dh = img.height*scale;
      ctx.fillStyle = "#0f172a";
      ctx.fillRect(0,0,size,size);
      ctx.drawImage(img, (size-dw)/2+ox, (size-dh)/2+oy, dw, dh);
      onCrop(canvas.toDataURL("image/jpeg",0.9));
    } finally { setBusy(false); }
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:1000,
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{color:"#f1f5f9",fontSize:17,fontWeight:700,marginBottom:8}}>✂️ Crop Photo</div>
      {/* Preview */}
      <div style={{width:"100%",maxWidth:360,aspectRatio:"1/1",borderRadius:14,overflow:"hidden",
        background:"#0f172a",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <img src={src} alt="crop" style={{
          width:`${zoom*100}%`, height:`${zoom*100}%`, objectFit:"cover",
          transform:`translate(${ox/5}px,${oy/5}px)`, pointerEvents:"none"}} />
      </div>
      {/* Sliders */}
      {[
        {label:"Zoom", val:zoom, set:setZoom, min:1, max:3, step:0.05},
        {label:"Move X", val:ox, set:setOx, min:-250, max:250, step:5},
        {label:"Move Y", val:oy, set:setOy, min:-250, max:250, step:5},
      ].map(s => (
        <div key={s.label} style={{width:"100%",maxWidth:360,marginBottom:10}}>
          <div style={{color:"#94a3b8",fontSize:12,fontWeight:700,marginBottom:4}}>{s.label}</div>
          <input type="range" min={s.min} max={s.max} step={s.step} value={s.val}
            onChange={e=>s.set(Number(e.target.value))}
            style={{width:"100%",accentColor:"#3b82f6"}} />
        </div>
      ))}
      <div style={{display:"flex",gap:10,width:"100%",maxWidth:360,marginTop:4}}>
        <button onClick={onCancel} style={{flex:1,background:"#334155",border:"none",borderRadius:12,
          color:"#94a3b8",fontSize:15,fontWeight:600,padding:"13px",cursor:"pointer",fontFamily:"inherit"}}>
          Cancel
        </button>
        <button onClick={doCrop} style={{flex:2,background:"#1d4ed8",border:"none",borderRadius:12,
          color:"#fff",fontSize:15,fontWeight:700,padding:"13px",cursor:"pointer",fontFamily:"inherit"}}>
          {busy ? "Saving…" : "✂️ Save Crop"}
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// PHOTO PICKER  (upload + paste + URL, all → crop)
// ═══════════════════════════════════════════════════════════════
function PhotoPicker({ onPhoto, label = "Add Photo" }) {
  const [cropSrc, setCropSrc] = useState(null);
  const [showUrl, setShowUrl] = useState(false);
  const [url, setUrl] = useState("");
  const [urlErr, setUrlErr] = useState("");
  const [pasteHint, setPasteHint] = useState("Click here, then Ctrl+V / ⌘+V to paste screenshot");

  const handleFile = file => {
    if (!file || !file.type.startsWith("image/")) return;
    const r = new FileReader();
    r.onload = ev => setCropSrc(ev.target.result);
    r.readAsDataURL(file);
  };

  const handlePaste = async () => {
    try {
      const items = await navigator.clipboard.read();
      for (const item of items) {
        const t = item.types.find(t => t.startsWith("image/"));
        if (t) { const blob = await item.getType(t); handleFile(blob); return; }
      }
      setPasteHint("No image found — copy a screenshot first.");
    } catch {
      setPasteHint("Clipboard blocked. Try uploading instead.");
    }
  };

  const onPasteEvent = e => {
    const item = Array.from(e.clipboardData?.items||[]).find(i=>i.type.startsWith("image/"));
    if (!item) { setPasteHint("No image found. Copy a screenshot first."); return; }
    handleFile(item.getAsFile());
    setPasteHint("Screenshot received ✅");
  };

  const applyUrl = () => {
    const t = url.trim(); if (!t) return;
    const img = new Image(); img.crossOrigin="anonymous";
    img.onload = () => setCropSrc(t);
    img.onerror = () => setUrlErr("Could not load. Try a direct .jpg/.png link.");
    img.src = t;
  };

  return (
    <>
      {cropSrc && <ImageCropper src={cropSrc}
        onCrop={d=>{ onPhoto(d); setCropSrc(null); setUrl(""); setShowUrl(false); }}
        onCancel={()=>setCropSrc(null)} />}

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {/* Paste area */}
        <div tabIndex={0} onPaste={onPasteEvent} onClick={handlePaste}
          style={{display:"flex",alignItems:"center",gap:8,background:"#0f172a",
            border:"1.5px dashed #3b82f6",borderRadius:12,padding:"11px 14px",
            cursor:"pointer",color:"#64748b",fontSize:13,outline:"none"}}>
          <Icon d={Icons.camera} size={16} color="#3b82f6" />
          <span>{pasteHint}</span>
        </div>

        <div style={{display:"flex",gap:8}}>
          {/* Upload */}
          <label style={{flex:2,display:"flex",alignItems:"center",justifyContent:"center",
            gap:7,background:"#1e293b",border:"1.5px dashed #475569",borderRadius:12,
            padding:"11px 10px",cursor:"pointer",color:"#cbd5e1",fontSize:14,
            fontWeight:600,fontFamily:"inherit"}}>
            <Icon d={Icons.camera} size={17} color="#94a3b8" /> {label}
            <input type="file" accept="image/*" style={{display:"none"}}
              onChange={e=>handleFile(e.target.files[0])} />
          </label>
          {/* URL */}
          <button style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",
            gap:6,background:showUrl?"#1e3a8a":"#1e293b",
            border:`1.5px dashed ${showUrl?"#3b82f6":"#475569"}`,
            borderRadius:12,padding:"11px 8px",cursor:"pointer",
            color:showUrl?"#93c5fd":"#cbd5e1",fontSize:14,fontWeight:600,fontFamily:"inherit"}}
            onClick={()=>{setShowUrl(v=>!v);setUrlErr("");}}>
            🔗 URL
          </button>
        </div>

        {showUrl && <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <input style={{...inp,borderColor:urlErr?"#ef4444":"#475569"}}
            placeholder="Paste image URL…" value={url}
            onChange={e=>{setUrl(e.target.value);setUrlErr("");}} />
          {urlErr && <div style={{color:"#ef4444",fontSize:12}}>{urlErr}</div>}
          <button style={{background:"#1d4ed8",border:"none",borderRadius:10,color:"#fff",
            fontSize:14,fontWeight:600,padding:"11px",cursor:"pointer",fontFamily:"inherit"}}
            onClick={applyUrl}>Use this image</button>
        </div>}
      </div>
    </>
  );
}

      display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:200}}>

function DeviceForm({ initial, onSave, onCancel, language = "en" }) {
  const [name, setName] = useState(initial?.name||"");
  const [muscle, setMuscle] = useState(initial?.muscle||"");
  const [exerciseType, setExerciseType] = useState(initial?.exerciseType||"complement");
  const [photo, setPhoto] = useState(initial?.photo||null);
  const [fn, setFn] = useState(false); const [fm, setFm] = useState(false);
  const save = () => { if (!name.trim()) return; onSave({name:name.trim(),muscle:muscle.trim(),exerciseType,photo}); };
  return (
    <div style={S.form}>
      <label style={S.lbl}>{t(language,"exerciseName")}</label>
      <input style={{...inp,borderColor:fn?"#3b82f6":"#475569",boxShadow:fn?"0 0 0 3px rgba(59,130,246,0.2)":"none"}}

        onChange={e=>setName(e.target.value)} onFocus={()=>setFn(true)} onBlur={()=>setFn(false)} autoFocus />
      <label style={S.lbl}>{t(language,"muscleGroup")}</label>
      <input style={{...inp,borderColor:fm?"#3b82f6":"#475569",boxShadow:fm?"0 0 0 3px rgba(59,130,246,0.2)":"none"}}
        placeholder={language==="de"?"z.B. Brust, Rücken, Beine":"e.g. Chest, Back, Legs"} value={muscle}
        onChange={e=>setMuscle(e.target.value)} onFocus={()=>setFm(true)} onBlur={()=>setFm(false)} />
      <label style={S.lbl}>{t(language,"exerciseType")}</label>
      <select style={inp} value={exerciseType} onChange={e=>setExerciseType(e.target.value)}>
        <option value="basic">{t(language,"basic")}</option>
        <option value="complement">{t(language,"complement")}</option>
      </select>
      <label style={S.lbl}>{t(language,"photo")}</label>
      <PhotoPicker onPhoto={setPhoto} label={photo?t(language,"changePhoto"):t(language,"addPhoto")} />
      {photo && <div style={{position:"relative",marginTop:4}}>
        <img src={photo} alt="preview" style={{borderRadius:10,maxHeight:130,objectFit:"cover",width:"100%"}} />
        <button style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.7)",
          border:"none",borderRadius:20,padding:"5px 10px",color:"#f87171",cursor:"pointer",fontSize:13,fontWeight:700}}
          onClick={()=>setPhoto(null)}>✕</button>
      </div>}
      <div style={{display:"flex",gap:8,marginTop:6}}>
        <button style={S.btnSec} onClick={onCancel}>{t(language,"no")}</button>
        <button style={S.btnPri} onClick={save}>{initial?t(language,"saveChanges"):t(language,"saveExercise")}</button>
      </div>
    </div>
  );
}

// LAST LOGS (shown inside session)
// ═══════════════════════════════════════════════════════════════
function LastLogs({ logs, deviceId, dayName, language = "en" }) {
  const sameDay = [...logs].filter(l=>l.deviceId===deviceId&&l.dayName===dayName)
    .sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const any = [...logs].filter(l=>l.deviceId===deviceId)
    .sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const show = sameDay || any;
  if (!show) return <div style={{color:"#64748b",fontSize:13,padding:"8px 0"}}>{language==="de"?"Kein früherer Log für diese Übung.":"No previous log for this exercise."}</div>;
  return (
    <div style={{background:"#0f172a",borderRadius:10,padding:"10px 12px",margin:"10px 0"}}>
      <div style={{color:"#64748b",fontSize:12,marginBottom:6}}>{language==="de"?"Letzter":"Last"}: {displayDayName(show.dayName, language)} · {formatDate(show.date)}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {show.sets.map((s,i)=><span key={i} style={S.pill}>{language==="de"?"Satz":"Set"} {i+1}: {s.weight}kg × {s.reps}</span>)}
      </div>
    </div>
  );
}

};

function localizedDefaultDevice(device, language = "en") {
  const localized = language === "de" ? DEFAULT_DEVICE_DE[device.id] : null;
  return localized ? { ...device, ...localized } : device;
}

function withDefaultDevicePhotos(devices, language = "en") {
  const defaultsById = Object.fromEntries(DEFAULT_DEVICES.map(d => [d.id, d]));
  if (!Array.isArray(devices)) return DEFAULT_DEVICES.map(d => localizedDefaultDevice(d, language));
  const seen = new Set(devices.map(d => d.id));
  const updated = devices.map(d => {
    const def = defaultsById[d.id];
    if (!def) return { ...d, exerciseType: d.exerciseType || "complement" };
    const manualPhoto = typeof d.photo === "string" && d.photo.startsWith("data:");
    const localized = localizedDefaultDevice(def, language);
    return { ...d, name: localized.name, muscle: localized.muscle, exerciseType: def.exerciseType, photo: manualPhoto ? d.photo : def.photo, days: def.days };
  });
  DEFAULT_DEVICES.forEach(d => {
    if (!seen.has(d.id)) updated.push(localizedDefaultDevice(d, language));
  });
  return updated;
}

function dayKey(name) {
  return String(name || "").trim().toLowerCase();
}

function uniqueCustomDays(days) {
  const seen = new Set(DEFAULT_DAYS.map(dayKey));
  const clean = [];
  (days || []).forEach(d => {
    const name = String(d?.name || "").trim();
    const key = dayKey(name);
    if (!key || seen.has(key)) return;
    seen.add(key);
    clean.push({ ...d, id: d.id || uid(), name });
  });
  return clean;
}


function groupKey(name) {
  return String(name || "Other").trim().toLowerCase();
}

function groupName(name) {
  const clean = String(name || "").trim();
  return clean || "Other";
}

function deviceMatchesDay(device, dayName) {
  const days = Array.isArray(device.days) ? device.days : [];
  if (!days.length) return true;
  const key = dayKey(dayName);
  return days.some(d => dayKey(d) === key);
}

function isLargeSuggestionGroup(muscle) {
  const key = groupKey(muscle);
  return key === groupKey("Chest") || key === groupKey("Back") || key === groupKey("Brust") || key === groupKey("Rücken");
}

function getSessionGroupStats(sessionLogs, devices, muscle) {
  const key = groupKey(muscle);
  return sessionLogs.reduce((acc, log) => {
    const d = devices.find(x => x.id === log.deviceId);
    if (!d || groupKey(d.muscle) !== key) return acc;
    if (d.exerciseType === "basic") acc.basic += 1;
    else acc.complement += 1;
    return acc;
  }, { basic: 0, complement: 0 });
}

function hasEnoughLargeGroupVolume(stats) {
  return (stats.basic >= 2 && stats.complement >= 1) || (stats.basic >= 1 && stats.complement >= 2);
}

function getMuscleGroups(devices, groupPhotos = {}) {
  const map = {};
  (devices || []).forEach(d => {
    const name = groupName(d.muscle);
    const key = groupKey(name);
    if (!map[key]) map[key] = { key, name, count: 0, devices: [], photo: groupPhotos[key] || null };
    map[key].count += 1;
    map[key].devices.push(d);
    if (!map[key].photo && d.photo) map[key].photo = d.photo;
  });
  return Object.values(map).sort((a,b) => a.name.localeCompare(b.name));
}

function GroupCard({ group, onClick, language = "en" }) {
  return (

}

// DAY SETUP — full CRUD like Exercises
// ═══════════════════════════════════════════════════════════════
function DaySetup({ dayTemplates, setDayTemplates, onStart, onRequestDeleteDays, language }) {
  const [date, setDate] = useState(today());
  const [selected, setSelected] = useState(null);
  const [mode, setMode] = useState(null); // null | "add" | {editing day template}
  const [editName, setEditName] = useState("");
  const [fd, setFd] = useState(false); const [fe, setFe] = useState(false);

  const customDays = uniqueCustomDays(dayTemplates);

  // Defaults are always shown once. Custom days are shown only if their name is not already a default.
  const allDays = [
    ...DEFAULT_DAYS.map(n => ({ id: "default-" + dayKey(n), name: n, isDefault: true })),
    ...customDays,
  ];

  const activeSelected = selected || allDays[0]?.name || "";

  function start() {
    const final = activeSelected.trim();
    if (!final) return;
    // Important: starting/finishing a workout must NOT create another Push Day/Pull Day entry.
    // The workout appears in History through logs; the Days list is only for reusable templates.
    onStart({ id: uid(), dayName: final, date });
  }

  function saveDay() {
    const finalName = editName.trim();
    if (!finalName) return;
    const finalKey = dayKey(finalName);

    if (mode === "add") {
      const existing = allDays.find(d => dayKey(d.name) === finalKey);
      if (!existing) setDayTemplates(prev => uniqueCustomDays([...prev, { id: uid(), name: finalName }]));
      setSelected(existing?.name || finalName);
    } else {
      const duplicate = allDays.find(d => d.id !== mode.id && dayKey(d.name) === finalKey);
      if (duplicate) {
        // If the edited custom day is renamed to an existing/default name, remove the duplicate template.
        setDayTemplates(prev => uniqueCustomDays(prev.filter(d => d.id !== mode.id)));
        setSelected(duplicate.name);
      } else {
        setDayTemplates(prev => uniqueCustomDays(prev.map(d => d.id === mode.id ? { ...d, name: finalName } : d)));
        setSelected(finalName);
      }
    }
    setMode(null); setEditName("");
  }

  function deleteDay(day) {
    if (day.isDefault) return; // can't delete defaults
    setDayTemplates(prev => uniqueCustomDays(prev.filter(d => d.id !== day.id)));
    if (activeSelected === day.name) setSelected(allDays.find(d => d.id !== day.id)?.name || null);
  }

  return (
    <div style={S.screen}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{...S.title,margin:0}}>{t(language,"startGymDay")}</h2>
        <button style={S.dangerSmall} onClick={onRequestDeleteDays}>{t(language,"clearCustom")}</button>
      </div>

      {/* Date picker */}
      <div style={S.block}>
        <label style={S.lbl}>{t(language,"trainingDate")}</label>
        <input style={{...inp,borderColor:fd?"#3b82f6":"#475569"}}
          type="date" value={date} onChange={e=>setDate(e.target.value)}
          onFocus={()=>setFd(true)} onBlur={()=>setFd(false)} />
        <div style={{color:"#60a5fa",fontSize:16,fontWeight:800,marginTop:6}}>{formatDate(date)}</div>
      </div>

      {/* Day list — like exercises */}
      <label style={S.lbl}>{t(language,"chooseTrainingDay")}</label>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
        {allDays.map(day => {
          const isSelected = activeSelected === day.name;
          return (
            <div key={day.id} style={{display:"flex",alignItems:"center",gap:10,
              background: isSelected ? "#1e3a8a" : "#1e293b",
              border:`2px solid ${isSelected?"#3b82f6":"#334155"}`,
              borderRadius:14,padding:"12px 14px",cursor:"pointer",
              transition:"all 0.1s"}}
              onClick={() => setSelected(day.name)}>
              <div style={{width:10,height:10,borderRadius:5,flexShrink:0,
                background: isSelected ? "#3b82f6" : "#334155",
                boxShadow: isSelected ? "0 0 6px #3b82f6" : "none"}} />
              <span style={{flex:1,fontSize:15,fontWeight: isSelected?700:500,
                color: isSelected?"#f1f5f9":"#94a3b8"}}>{displayDayName(day.name, language)}</span>
              {day.isDefault
                ? <span style={{fontSize:10,color:"#475569",fontWeight:600}}>{t(language,"default")}</span>
                : <>
                    <button style={S.iconBtn} onClick={e=>{e.stopPropagation();setMode(day);setEditName(day.name);}}>
                      <Icon d={Icons.edit} size={15} color="#60a5fa" />
                    </button>
                    <button style={S.iconBtn} onClick={e=>{e.stopPropagation();deleteDay(day);}}>
                      <Icon d={Icons.trash} size={15} color="#ef4444" />
                    </button>
                  </>
              }
            </div>
          );
        })}
      </div>

      {/* Add / Edit form */}
      {mode ? (
        <div style={S.form}>
          <label style={S.lbl}>{mode==="add"?t(language,"newDayName"):t(language,"editDayName")}</label>
          <input style={{...inp,borderColor:fe?"#3b82f6":"#475569",
            boxShadow:fe?"0 0 0 3px rgba(59,130,246,0.2)":"none"}}
            placeholder={language==="de"?"z.B. Schulter-Tag, Cardio, Ganzkörper":"e.g. Shoulder Day, Cardio, Full Body"}
            value={editName} onChange={e=>setEditName(e.target.value)}
            onFocus={()=>setFe(true)} onBlur={()=>setFe(false)} autoFocus />
          <div style={{display:"flex",gap:8}}>
            <button style={S.btnSec} onClick={()=>{setMode(null);setEditName("");}}>{language==="de"?"Abbrechen":"Cancel"}</button>
            <button style={S.btnPri} onClick={saveDay}>{mode==="add"?t(language,"addNewDay"):t(language,"saveChanges")}</button>
          </div>
        </div>
      ) : (
        <button style={{...S.btnSec,width:"100%",marginBottom:12,display:"flex",
          alignItems:"center",justifyContent:"center",gap:6,border:"2px dashed #475569",
          background:"transparent"}}
          onClick={()=>{setMode("add");setEditName("");}}>
          <Icon d={Icons.plus} size={16} color="#94a3b8" /> {t(language,"addNewDay")}
        </button>
      )}

      {/* Start button */}
      {!mode && <button style={S.btnPri} onClick={start}>
        <Icon d={Icons.play} size={16} color="#fff" />
        {t(language,"start")} {displayDayName(activeSelected || "Day", language)}
      </button>}
    </div>
  );
}

// SESSION SCREEN
// ═══════════════════════════════════════════════════════════════
function SessionScreen({ session, setSession, devices, setDevices, groupPhotos, logs, setLogs, timerSettings, onEnd, language }) {
  const [activeId, setActiveId] = useState(null);
  const [sets, setSets] = useState([{weight:"",reps:""}]);
  const [addingDevice, setAddingDevice] = useState(false);
  const [doneIds, setDoneIds] = useState([]);
  const [showChooser, setShowChooser] = useState(true);
  const [editingLog, setEditingLog] = useState(null);
  const [foc, setFoc] = useState({});
  const [selectedGroup, setSelectedGroup] = useState(null);
  const [restTimer, setRestTimer] = useState(null);
  const [saveConfirmOpen, setSaveConfirmOpen] = useState(false);
  const [restNotice, setRestNotice] = useState(null);
  const [volumeNoticeGroups, setVolumeNoticeGroups] = useState([]);

  const getRestRemaining = (timer) => {
    if (!timer) return 0;
    if (!timer.endAt) return Math.max(0, Number(timer.remaining) || 0);
    return Math.max(0, Math.ceil((timer.endAt - Date.now()) / 1000));
  };

  const showRestOverNotice = (type) => {
    const message = type === "set"
      ? t(language,"setRestOver")
      : t(language,"exerciseRestOver");
    setRestNotice({ title: t(language,"restOver"), message });
  };

  useEffect(() => {
    if (!restTimer) return;
    let active = true;
    const syncTimer = () => {
      if (!active) return;
      const remaining = getRestRemaining(restTimer);
      if (remaining <= 0) {
        setRestTimer(null);
        showRestOverNotice(restTimer.type);
        return;
      }
      setRestTimer(timer => timer ? {...timer, remaining: getRestRemaining(timer)} : null);
    };
    syncTimer();
    const id = setInterval(syncTimer, 1000);
    const onVisible = () => {
      if (!document.hidden) syncTimer();
    };
    document.addEventListener("visibilitychange", onVisible);
    window.addEventListener("focus", syncTimer);
    window.addEventListener("pageshow", syncTimer);
    return () => {
      active = false;
      clearInterval(id);
      document.removeEventListener("visibilitychange", onVisible);
      window.removeEventListener("focus", syncTimer);
      window.removeEventListener("pageshow", syncTimer);
    };
  }, [restTimer?.endAt, restTimer?.type, language]);

  const formatRestTime = (seconds) => `${Math.floor(seconds/60)}:${String(seconds%60).padStart(2,"0")}`;

  const startRestTimer = (type) => {
    const seconds = type === "set" ? timerSettings.setRestSeconds : timerSettings.exerciseRestSeconds;
    if (!seconds || seconds <= 0) return;
    setRestTimer({ type, remaining: seconds, total: seconds, endAt: Date.now() + seconds * 1000 });
  };

  const openRestNotice = (action = null, payload = null) => {
    if (!restTimer) return false;
    const remaining = getRestRemaining(restTimer);
    if (remaining <= 0) {
      setRestTimer(null);
      return false;
    }
    const restLabel = restTimer.type === "set" ? t(language,"setRest") : t(language,"exerciseRest");
    setRestNotice({
      title: t(language,"restRunning"),
      message: `${restLabel} ${t(language,"restRunningMessage")}: ${formatRestTime(remaining)}. ${t(language,"recoveryMessage")}`,
      action,
      payload
    });
    return true;
  };

  const closeRestNotice = () => {
    const notice = restNotice;
    setRestNotice(null);
    if (notice?.action === "chooseDevice") doChooseDevice(notice.payload);
    if (notice?.action === "saveExercise") setSaveConfirmOpen(true);
  };

  const addNextSet = () => {
    openRestNotice();
    setSets(prev=>[...prev,{weight:"",reps:""}]);
    startRestTimer("set");
  };

  const active = devices.find(d=>d.id===activeId);
  const todaysLogs = logs.filter(l=>l.sessionId===session.id);
  const sessionDoneIds = [...new Set([...doneIds, ...todaysLogs.map(l=>l.deviceId)])];
  const warn = activeId ? getProgressWarning(logs.filter(l=>l.id!==editingLog?.id), activeId) : false;
  const dayDevices = devices.filter(d => deviceMatchesDay(d, session.dayName));
  const groups = getMuscleGroups(dayDevices, groupPhotos);
  const currentGroup = selectedGroup ? groups.find(g => g.key === selectedGroup) : null;
  const filteredDevices = selectedGroup ? dayDevices.filter(d => groupKey(d.muscle) === selectedGroup) : dayDevices;
  const currentGroupStats = currentGroup ? getSessionGroupStats(todaysLogs, devices, currentGroup.name) : { basic: 0, complement: 0 };
  const shouldSuggestComplement = d => {
    if (!currentGroup || !isLargeSuggestionGroup(d.muscle)) return false;
    if (d.exerciseType !== "complement" || sessionDoneIds.includes(d.id)) return false;
    return currentGroupStats.basic >= 1 && !hasEnoughLargeGroupVolume(currentGroupStats);
  };

  const doChooseDevice = id => {
    setShowChooser(false); setAddingDevice(false);
    setActiveId(id); setEditingLog(null);
    setSets([{weight:"",reps:""}]);
  };

  const chooseDevice = id => {
    if (openRestNotice("chooseDevice", id)) return;
    doChooseDevice(id);
  };

  const saveDevice = () => {
    if (!activeId) {
      alert(t(language,"pleaseChoose"));
      return;
    }
    const cleaned = cleanSets(sets);
    if (!cleaned.length) {
      alert(t(language,"pleaseSet"));
      return;
    }

    if (!editingLog && openRestNotice("saveExercise")) return;
    setSaveConfirmOpen(true);
  };

  const performSaveDevice = () => {
    if (!activeId) return;
    const cleaned = cleanSets(sets);
    if (!cleaned.length) return;
    const savedDevice = devices.find(d => d.id === activeId);

    const base = { deviceId:activeId, dayName:session.dayName,
      date:new Date(session.date).toISOString(), sets:cleaned, sessionId:session.id };

    if (editingLog) {
      setLogs(prev=>prev.map(l=>l.id===editingLog.id?{...editingLog,...base}:l));
    } else {
      const newLog = {id:uid(),...base};
      const nextSessionLogs = [...todaysLogs, newLog];
      setLogs(prev=>[...prev,newLog]);
      setDoneIds(prev=>[...new Set([...prev,activeId])]);
      startRestTimer("exercise");
      if (savedDevice && isLargeSuggestionGroup(savedDevice.muscle)) {
        const muscleKey = groupKey(savedDevice.muscle);
        const stats = getSessionGroupStats(nextSessionLogs, devices, savedDevice.muscle);
        if (hasEnoughLargeGroupVolume(stats) && !volumeNoticeGroups.includes(muscleKey)) {
          setVolumeNoticeGroups(prev=>[...new Set([...prev, muscleKey])]);
          setRestNotice({
            title: t(language,"volumeReached"),
            message: `${t(language,"volumeMessage")} ${groupName(savedDevice.muscle)}: ${stats.basic} ${t(language,"basic")} and ${stats.complement} ${t(language,"complement")}. ${t(language,"continueStrong")}`
          });
        }
      }
    }

    setSets([{weight:"",reps:""}]);
    setActiveId(null);
    setAddingDevice(false);
    setShowChooser(true);
    setEditingLog(null);
    setSaveConfirmOpen(false);
  };

  const chooseForEdit = log => {
    setEditingLog(log); setShowChooser(false); setAddingDevice(false);
    setActiveId(log.deviceId);
    setSets(log.sets.map(s=>({weight:String(s.weight),reps:String(s.reps)})));
  };

  const addNewDevice = data => {
    openRestNotice();
    const d = {id:uid(),...data};
    setDevices(prev=>[...prev,d]);
    setAddingDevice(false); setShowChooser(false);
    setActiveId(d.id); setSets([{weight:"",reps:""}]);
  };

  const updateSet = (i,f,v) => setSets(prev=>prev.map((s,idx)=>idx===i?{...s,[f]:v}:s));

  return (
    <div style={S.screen}>
      {saveConfirmOpen && <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{width:"100%",maxWidth:360,background:"#1e293b",border:"1px solid #475569",borderRadius:18,padding:20}}>
          <h3 style={{margin:"0 0 8px",fontSize:20,color:"#fff"}}>{editingLog?t(language,"saveChangesQuestion"):t(language,"finishExercise")}</h3>
          <p style={{color:"#cbd5e1",margin:"0 0 16px",lineHeight:1.5}}>
            {editingLog?t(language,"updateExerciseLog"):t(language,"saveLogNext")}
          </p>
          <div style={{display:"flex",gap:8}}>
            <button style={{flex:1,background:"#334155",border:"none",borderRadius:12,color:"#cbd5e1",fontWeight:700,padding:13,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setSaveConfirmOpen(false)}>{t(language,"no")}</button>
            <button style={{flex:1,background:"#1d4ed8",border:"none",borderRadius:12,color:"#fff",fontWeight:800,padding:13,cursor:"pointer",fontFamily:"inherit"}} onClick={performSaveDevice}>{t(language,"yesSave")}</button>
          </div>
        </div>
      </div>}
      <button style={S.backBtn} onClick={onEnd}><Icon d={Icons.back} size={18} /> {t(language,"endBack")}</button>
      <h2 style={S.title}>{displayDayName(session.dayName, language)}</h2>

      {restNotice && <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.72)",zIndex:350,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{width:"100%",maxWidth:360,background:"#1e293b",border:"1px solid #f59e0b",borderRadius:18,padding:20,boxShadow:"0 10px 40px rgba(0,0,0,0.45)"}}>
          <h3 style={{margin:"0 0 8px",fontSize:20,color:"#fbbf24"}}>{restNotice.title}</h3>
          <p style={{color:"#e2e8f0",margin:"0 0 16px",lineHeight:1.5,fontSize:14}}>{restNotice.message}</p>
          <button style={{...S.btnPri,background:"#f59e0b",color:"#000"}} onClick={closeRestNotice}>OK</button>
        </div>
      </div>}

      {restTimer && <div style={{...S.block,border:"1px solid #f59e0b",background:"#1c1917"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <div>
            <div style={{fontSize:12,color:"#fbbf24",fontWeight:800,textTransform:"uppercase",letterSpacing:0.5}}>
              {restTimer.type === "set" ? "Rest between sets" : "Rest between exercises"}
            </div>
            <div style={{fontSize:30,fontWeight:900,color:"#f8fafc",marginTop:2}}>
              {Math.floor(restTimer.remaining/60)}:{String(restTimer.remaining%60).padStart(2,"0")}
            </div>
          </div>
          <button style={{...S.btnSec,flex:"0 0 auto",padding:"10px 14px"}} onClick={()=>setRestTimer(null)}>Stop</button>
        </div>
      </div>}

      <div style={S.block}>
        <label style={S.lbl}>{t(language,"trainingDate")}</label>
        <input style={inp} type="date" value={session.date}
          onChange={e=>setSession(prev=>({...prev,date:e.target.value}))} />
        <div style={{color:"#60a5fa",fontSize:15,fontWeight:800,marginTop:6}}>{formatDate(session.date)}</div>
      </div>

      {todaysLogs.length > 0 && <div style={S.block}>
        <label style={S.lbl}>{t(language,"savedToday")}</label>
        {todaysLogs.map(log=>{
          const d=devices.find(x=>x.id===log.deviceId);
          return <div key={log.id} style={{display:"flex",alignItems:"center",gap:8,
            background:"#0f172a",borderRadius:10,padding:"8px 10px",marginBottom:6}}>
            <span style={{flex:1,fontSize:14,color:"#e2e8f0"}}>{d?.name||"Unknown"}</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {log.sets.map((s,i)=><span key={i} style={S.pill}>{s.weight}×{s.reps}</span>)}
            </div>
            <button style={S.iconBtn} onClick={()=>chooseForEdit(log)}>
              <Icon d={Icons.edit} size={15} color="#60a5fa" />
            </button>
          </div>;
        })}
      </div>}

      {!activeId && !addingDevice && showChooser && <div style={S.block}>
        <label style={S.lbl}>{todaysLogs.length===0?t(language,"chooseFirstExercise"):t(language,"addNextExercise")}</label>
        {devices.length===0&&<div style={{color:"#64748b",fontSize:13,padding:"8px 0"}}>{t(language,"noExercises")}</div>}
        {devices.length>0&&dayDevices.length===0&&<div style={{color:"#64748b",fontSize:13,padding:"8px 0"}}>{t(language,"noTagged")}</div>}

        {!selectedGroup && dayDevices.length>0 && <>
          <div style={{color:"#64748b",fontSize:13,lineHeight:1.5,marginBottom:10}}>{t(language,"firstChooseGroup")}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:10}}>
            {groups.map(g=><GroupCard language={language} key={g.key} group={g} onClick={()=>setSelectedGroup(g.key)} />)}
          </div>
        </>}

        {selectedGroup && <>
          <button style={{...S.backBtn,marginBottom:10}} onClick={()=>setSelectedGroup(null)}>
            <Icon d={Icons.back} size={17} /> {t(language,"backToGroups")}
          </button>
          <div style={{fontSize:16,fontWeight:800,color:"#f1f5f9",marginBottom:10}}>{currentGroup?.name || "Exercises"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            {filteredDevices.map(d=>{
              const suggested = shouldSuggestComplement(d);
              return (
                <button key={d.id} style={{background:suggested?"#172554":"#0f172a",border:suggested?"1px solid #60a5fa":"1px solid #334155",borderRadius:14,
                  color:"#e2e8f0",padding:10,cursor:"pointer",display:"flex",flexDirection:"column",
                  gap:6,alignItems:"center",minHeight:90,position:"relative",boxShadow:suggested?"0 0 0 2px rgba(96,165,250,0.18)":"none"}}
                  onClick={()=>chooseDevice(d.id)}>
                  {suggested&&<span style={{position:"absolute",top:6,left:6,
                    background:"#fb7185",border:"1px solid #fecdd3",borderRadius:20,fontSize:12,fontWeight:900,
                    color:"#1f0710",padding:"4px 9px",boxShadow:"0 0 18px rgba(251,113,133,0.55)"}}>→ Suggest</span>}
                  {d.photo?<img src={d.photo} alt="" style={{width:54,height:54,borderRadius:10,objectFit:"cover"}} />
                    :<div style={{width:54,height:54,borderRadius:10,background:"#1e293b",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <Icon d={Icons.dumbbell} size={22} color="#475569" /></div>}
                  <span style={{fontSize:12,fontWeight:600,textAlign:"center"}}>{d.name}</span>
                  <span style={{...S.typeBadge,background:d.exerciseType==="basic"?"#1e3a8a":"#334155",color:d.exerciseType==="basic"?"#bfdbfe":"#cbd5e1"}}>
                    {exerciseTypeLabel(d.exerciseType, language)}
                  </span>
                  {sessionDoneIds.includes(d.id)&&<span style={{position:"absolute",top:6,right:6,
                    background:"#22c55e",borderRadius:20,fontSize:10,fontWeight:800,
                    color:"#fff",padding:"2px 6px"}}>✓</span>}
                </button>
              );
            })}
          </div>
        </>}

        <button style={{...S.btnSec,width:"100%",marginBottom:8,display:"flex",
          alignItems:"center",justifyContent:"center",gap:6}}
          onClick={()=>{setAddingDevice(true);setShowChooser(false);}}>
          <Icon d={Icons.plus} size={16} /> {t(language,"addNewExercise")}
        </button>
        <button style={S.btnPri} onClick={onEnd}>
          <Icon d={Icons.check} size={16} color="#fff" /> {t(language,"finishWorkout")}
        </button>
      </div>}

      {addingDevice && <DeviceForm language={language} onCancel={()=>{setAddingDevice(false);setShowChooser(true);}} onSave={addNewDevice} />}

      {active && <div style={S.block}>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
          {active.photo?<img src={active.photo} alt="" style={{width:58,height:58,borderRadius:12,objectFit:"cover"}} />
            :<div style={{width:58,height:58,borderRadius:12,background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Icon d={Icons.dumbbell} size={24} color="#475569" /></div>}
          <div>
            <div style={{fontSize:17,fontWeight:800,color:"#f1f5f9"}}>{active.name}</div>
            <div style={{fontSize:12,color:"#94a3b8"}}>{groupName(active.muscle)}</div>
            <div style={{marginTop:4}}>
              <span style={{...S.typeBadge,background:active.exerciseType==="basic"?"#1e3a8a":"#334155",color:active.exerciseType==="basic"?"#bfdbfe":"#cbd5e1"}}>
                {exerciseTypeLabel(active.exerciseType, language)}
              </span>
            </div>
          </div>
        </div>

        {warn && <div style={S.warn}><Icon d={Icons.warning} size={15} color="#fbbf24" /> Same weight 2 weeks — time to raise! 💪</div>}

        <LastLogs language={language} logs={logs.filter(l=>l.id!==editingLog?.id)} deviceId={active.id} dayName={session.dayName} />

        <label style={S.lbl}>{editingLog?t(language,"editSets"):t(language,"logSets")}</label>
        {sets.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{color:"#64748b",fontSize:13,minWidth:44}}>{language==="de"?"Satz":"Set"} {i+1}</span>
            <input style={{...inp,width:80,textAlign:"center",padding:"10px 6px",
              borderColor:foc[`w${i}`]?"#3b82f6":"#475569",
              boxShadow:foc[`w${i}`]?"0 0 0 3px rgba(59,130,246,0.2)":"none"}}
              type="number" inputMode="decimal" placeholder="kg" value={s.weight}
              onChange={e=>updateSet(i,"weight",e.target.value)}
              onFocus={()=>setFoc(p=>({...p,[`w${i}`]:true}))}
              onBlur={()=>setFoc(p=>({...p,[`w${i}`]:false}))} />
            <span style={{color:"#475569",fontSize:18}}>×</span>
            <input style={{...inp,width:80,textAlign:"center",padding:"10px 6px",
              borderColor:foc[`r${i}`]?"#3b82f6":"#475569",
              boxShadow:foc[`r${i}`]?"0 0 0 3px rgba(59,130,246,0.2)":"none"}}
              type="number" inputMode="numeric" placeholder="reps" value={s.reps}
              onChange={e=>updateSet(i,"reps",e.target.value)}
              onFocus={()=>setFoc(p=>({...p,[`r${i}`]:true}))}
              onBlur={()=>setFoc(p=>({...p,[`r${i}`]:false}))} />
            <button style={S.iconBtn} onClick={()=>setSets(prev=>prev.filter((_,idx)=>idx!==i))}>
              <Icon d={Icons.trash} size={14} color="#ef4444" />
            </button>
          </div>
        ))}
        <button style={{background:"linear-gradient(135deg,#2563eb,#1d4ed8)",border:"2px solid #60a5fa",borderRadius:16,
          color:"#fff",fontSize:18,fontWeight:900,padding:"17px 16px",cursor:"pointer",
          width:"100%",fontFamily:"inherit",marginBottom:12,boxShadow:"0 8px 26px rgba(37,99,235,0.35)",letterSpacing:0.3}}
          onClick={addNextSet}>
          + {t(language,"addNextSet")}
        </button>
        <div style={{display:"flex",gap:8}}>
          <button style={{...S.btnSec,flex:1}} onClick={()=>{setActiveId(null);setEditingLog(null);setSets([{weight:"",reps:""}]);setShowChooser(true);}}>
            ← Back
          </button>
          <button style={{...S.btnPri,flex:2}} onClick={saveDevice}>
            {editingLog?t(language,"updateExercise"):t(language,"saveNextExercise")}
          </button>
        </div>
      </div>}
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════
// DEVICES SCREEN
// ═══════════════════════════════════════════════════════════════
function DevicesScreen({ devices, setDevices, groupPhotos, setGroupPhotos, onRequestDeleteAll, language }) {
  const [mode, setMode] = useState(null);
  const [openGroup, setOpenGroup] = useState(null);
  const [editingGroupPhoto, setEditingGroupPhoto] = useState(false);
  const groups = getMuscleGroups(devices, groupPhotos);
  const currentGroup = openGroup ? groups.find(g => g.key === openGroup) : null;
  const currentDevices = openGroup ? devices.filter(d => groupKey(d.muscle) === openGroup) : [];

  const handleSave = data => {
    if (mode==="add") setDevices(prev=>[...prev,{id:uid(),...data}]);
    else setDevices(prev=>prev.map(d=>d.id===mode.id?{...d,...data}:d));
    setMode(null);
  };

  const setGroupPhoto = photo => {
    if (!openGroup) return;
    setGroupPhotos(prev => ({...prev, [openGroup]: photo}));
    setEditingGroupPhoto(false);
  };

  if (openGroup && currentGroup) return (
    <div style={S.screen}>
      <button style={S.backBtn} onClick={()=>{setOpenGroup(null);setEditingGroupPhoto(false);}}>
        <Icon d={Icons.back} size={18} /> {t(language,"backToGroups")}
      </button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:10}}>
        <div>
          <h2 style={{...S.title,margin:0}}>{currentGroup.name}</h2>
          <div style={{fontSize:12,color:"#64748b",marginTop:4}}>{currentGroup.count} {language==="de"?"Übungen":"exercises"}</div>
        </div>
        <button style={S.dangerSmall} onClick={()=>setEditingGroupPhoto(v=>!v)}>{t(language,"groupPhoto")}</button>
      </div>

      <div style={{...S.block,padding:12}}>
        {currentGroup.photo
          ? <img src={currentGroup.photo} alt="" style={{width:"100%",height:140,borderRadius:14,objectFit:"cover",marginBottom:editingGroupPhoto?10:0}} />
          : <div style={{height:120,borderRadius:14,background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:editingGroupPhoto?10:0}}>
              <Icon d={Icons.dumbbell} size={34} color="#475569" />
            </div>}
        {editingGroupPhoto && <>
          <label style={S.lbl}>{t(language,"photoForGroup")}</label>
          <PhotoPicker onPhoto={setGroupPhoto} label={currentGroup.photo?t(language,"changeGroupPhoto"):t(language,"addGroupPhoto")} />
          {groupPhotos?.[openGroup] && <button style={{...S.btnSec,width:"100%",marginTop:8}} onClick={()=>setGroupPhotos(prev=>{const n={...prev}; delete n[openGroup]; return n;})}>{t(language,"removeGroupPhoto")}</button>}
        </>}
      </div>

      {currentDevices.length===0&&<div style={S.empty}>{t(language,"noExercisesGroup")}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {currentDevices.map(d=>(
          <div key={d.id} style={S.card}>
            {d.photo?<img src={d.photo} alt={d.name} style={S.thumb} />
              :<div style={S.thumbPh}><Icon d={Icons.dumbbell} size={26} color="#475569" /></div>}
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>{d.name}</div>
              <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{groupName(d.muscle)}</div>
              <div style={{marginTop:5}}>
                <span style={{...S.typeBadge,background:d.exerciseType==="basic"?"#1e3a8a":"#334155",color:d.exerciseType==="basic"?"#bfdbfe":"#cbd5e1"}}>
                  {exerciseTypeLabel(d.exerciseType, language)}
                </span>
              </div>
            </div>
            <button style={S.iconBtn} onClick={()=>setMode(d)}><Icon d={Icons.edit} size={17} color="#60a5fa" /></button>
            <button style={S.iconBtn} onClick={()=>setDevices(prev=>prev.filter(x=>x.id!==d.id))}><Icon d={Icons.trash} size={17} color="#ef4444" /></button>
          </div>
        ))}
      </div>
      {mode?<DeviceForm language={language} initial={mode==="add"?null:mode} onSave={handleSave} onCancel={()=>setMode(null)} />
        :<button style={S.fab} onClick={()=>setMode("add")}><Icon d={Icons.plus} size={24} color="#fff" /></button>}
    </div>
  );

  return (
    <div style={S.screen}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{...S.title,margin:0}}>{t(language,"exercises")}</h2>
        <button style={S.dangerSmall} onClick={onRequestDeleteAll}>{t(language,"deleteAll")}</button>
      </div>
      {devices.length===0&&!mode&&<div style={S.empty}>{language==="de"?"Noch keine Übungen. Tippe auf +, um deine erste Übung hinzuzufügen.":"No exercises yet. Tap + to add your first exercise."}</div>}
      {devices.length>0 && !mode && <>
        <div style={{color:"#64748b",fontSize:13,lineHeight:1.5,marginBottom:12}}>{t(language,"exercisesGrouped")}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {groups.map(g=><GroupCard language={language} key={g.key} group={g} onClick={()=>setOpenGroup(g.key)} />)}
        </div>
      </>}
      {mode?<DeviceForm language={language} initial={mode==="add"?null:mode} onSave={handleSave} onCancel={()=>setMode(null)} />
        :<button style={S.fab} onClick={()=>setMode("add")}><Icon d={Icons.plus} size={24} color="#fff" /></button>}
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════
// HISTORY SCREEN
// ═══════════════════════════════════════════════════════════════
function HistoryScreen({ logs, devices, setLogs, onRequestDeleteAll, onResumeSession, language }) {
  const [view, setView] = useState("days");
  const [openSessionId, setOpenSessionId] = useState(null);
  const [openDeviceId, setOpenDeviceId] = useState(null);
  const [editingSessionId, setEditingSessionId] = useState(null);
  const [editSessionName, setEditSessionName] = useState("");
  const [editSessionDate, setEditSessionDate] = useState(today());

  const sessions = Object.values(
    logs.reduce((acc,log)=>{
      const key = log.sessionId||`${log.dayName}-${log.date}`;
      if (!acc[key]) acc[key]={id:key,dayName:log.dayName,date:log.date,logs:[]};
      acc[key].logs.push(log);
      return acc;
    }, {})
  ).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const openedSession = sessions.find(s=>s.id===openSessionId);
  const openedDevice = devices.find(d=>d.id===openDeviceId);
  const devLogs = [...logs].filter(l=>l.deviceId===openDeviceId)
    .sort((a,b)=>new Date(b.date)-new Date(a.date));

  const removeLog = id => {
    if (window.confirm("Delete this exercise log?")) setLogs(prev=>prev.filter(x=>x.id!==id));
  };
  const deleteSession = sessionId => {
    if (!window.confirm("Delete this whole training day from history?")) return;
    setLogs(prev=>prev.filter(l => (l.sessionId || `${l.dayName}-${l.date}`) !== sessionId));
    if (openSessionId === sessionId) setOpenSessionId(null);
  };
  const startEditSession = s => {
    setEditingSessionId(s.id);
    setEditSessionName(s.dayName);
    setEditSessionDate(new Date(s.date).toISOString().slice(0,10));
  };
  const saveEditSession = () => {
    const name = editSessionName.trim();
    if (!name || !editingSessionId) return;
    const iso = new Date(editSessionDate).toISOString();
    setLogs(prev => prev.map(l => (l.sessionId || `${l.dayName}-${l.date}`) === editingSessionId
      ? { ...l, dayName:name, date:iso }
      : l
    ));
    setEditingSessionId(null); setEditSessionName("");
  };

  // Detail: session
  if (openedSession) return (
    <div style={S.screen}>
      <button style={S.backBtn} onClick={()=>setOpenSessionId(null)}><Icon d={Icons.back} size={18} /> Back</button>
      {editingSessionId === openedSession.id ? (
        <div style={{...S.block,marginBottom:16}}>
          <label style={S.lbl}>Edit training day</label>
          <input style={{...inp,marginBottom:8}} value={editSessionName} onChange={e=>setEditSessionName(e.target.value)} />
          <input style={inp} type="date" value={editSessionDate} onChange={e=>setEditSessionDate(e.target.value)} />
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button style={{...S.btnSec,flex:1}} onClick={()=>setEditingSessionId(null)}>No</button>
            <button style={{...S.btnPri,flex:1}} onClick={saveEditSession}>Yes</button>
          </div>
        </div>
      ) : (
        <>
          <h2 style={S.title}>{displayDayName(openedSession.dayName, language)}</h2>
          <div style={{color:"#60a5fa",fontSize:15,fontWeight:800,marginBottom:12}}>{formatDate(openedSession.date)}</div>
        </>
      )}
      <div style={{display:"flex",gap:8,marginBottom:8,justifyContent:"flex-end"}}>
        <button title="Edit day" style={{...S.iconBtn,background:"#0f172a",border:"1px solid #334155",borderRadius:10,padding:10}} onClick={()=>startEditSession(openedSession)}>
          <Icon d={Icons.edit} size={17} color="#60a5fa" />
        </button>
        <button title="Delete day" style={{...S.iconBtn,background:"#450a0a",border:"1px solid #7f1d1d",borderRadius:10,padding:10}} onClick={()=>deleteSession(openedSession.id)}>
          <Icon d={Icons.trash} size={17} color="#ef4444" />
        </button>
      </div>
      <button style={{...S.btnPri,marginBottom:16,background:"#059669"}} onClick={()=>onResumeSession && onResumeSession({
        id: openedSession.id,
        dayName: openedSession.dayName,
        date: new Date(openedSession.date).toISOString().slice(0,10)
      })}>
        <Icon d={Icons.plus} size={16} color="#fff" /> {t(language,"addExerciseToDay")}
      </button>
      {openedSession.logs.map(log=>{
        const d=devices.find(x=>x.id===log.deviceId);
        return <div key={log.id} style={S.block}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            {d?.photo?<img src={d.photo} alt="" style={{width:48,height:48,borderRadius:10,objectFit:"cover"}} />
              :<div style={{width:48,height:48,borderRadius:10,background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Icon d={Icons.dumbbell} size={20} color="#475569" /></div>}
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>{d?.name||"Unknown"}</div>
              <div style={{fontSize:12,color:"#94a3b8"}}>{d?.muscle||""}</div>
            </div>
            <button style={S.iconBtn} onClick={()=>removeLog(log.id)}><Icon d={Icons.trash} size={16} color="#ef4444" /></button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {log.sets.map((s,i)=><span key={i} style={S.pill}>{s.weight}kg × {s.reps}</span>)}
          </div>
        </div>;
      })}
    </div>
  );

  // Detail: exercise
  if (openedDevice) return (
    <div style={S.screen}>
      <button style={S.backBtn} onClick={()=>setOpenDeviceId(null)}><Icon d={Icons.back} size={18} /> Back</button>
      <h2 style={S.title}>{openedDevice.name}</h2>
      <div style={{color:"#94a3b8",fontSize:13,marginBottom:16}}>{openedDevice.muscle}</div>
      {devLogs.length===0&&<div style={S.empty}>{t(language,"noSessionsExercise")}</div>}
      {devLogs.map(log=>(
        <div key={log.id} style={S.block}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div>
              <div style={{fontWeight:700,color:"#f1f5f9"}}>{log.dayName}</div>
              <div style={{color:"#64748b",fontSize:12}}>{formatDate(log.date)}</div>
            </div>
            <button style={S.iconBtn} onClick={()=>removeLog(log.id)}><Icon d={Icons.trash} size={16} color="#ef4444" /></button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {log.sets.map((s,i)=><span key={i} style={S.pill}>{s.weight}kg × {s.reps}</span>)}
          </div>
          {getProgressWarning(logs,log.deviceId)&&<div style={{...S.warn,marginTop:8}}>
            <Icon d={Icons.warning} size={13} color="#fbbf24" /> Same weight 2 weeks — time to raise!
          </div>}
        </div>
      ))}
    </div>
  );

  return (
    <div style={S.screen}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{...S.title,margin:0}}>{t(language,"history")}</h2>
        <button style={S.dangerSmall} onClick={onRequestDeleteAll}>{t(language,"deleteAll")}</button>
      </div>
      {/* Segment */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,
        background:"#020617",border:"1px solid #334155",borderRadius:14,padding:6,marginBottom:14}}>
        {["days","devices"].map(k=>(
          <button key={k} style={{border:"none",borderRadius:10,padding:11,fontWeight:800,cursor:"pointer",
            background:view===k?"#1d4ed8":"transparent",color:view===k?"#fff":"#94a3b8",fontFamily:"inherit",
            fontSize:14,textTransform:"capitalize"}}
            onClick={()=>setView(k)}>{k === "devices" ? t(language,"exercises") : t(language,"days")}</button>
        ))}
      </div>

      {view==="days"&&<>
        {sessions.length===0&&<div style={S.empty}>{t(language,"noSavedSessions")}</div>}
        {sessions.map(s=>(
          <div key={s.id} style={{width:"100%",background:"#1e293b",color:"#e2e8f0",
            border:"1px solid #334155",borderRadius:14,padding:14,marginBottom:10,
            display:"flex",alignItems:"center",justifyContent:"space-between",
            textAlign:"left",gap:10,fontFamily:"inherit"}}>
            {editingSessionId === s.id ? (
              <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
                <input style={inp} value={editSessionName} onChange={e=>setEditSessionName(e.target.value)} />
                <input style={inp} type="date" value={editSessionDate} onChange={e=>setEditSessionDate(e.target.value)} />
                <div style={{display:"flex",gap:8}}>
                  <button style={{...S.btnSec,flex:1}} onClick={()=>setEditingSessionId(null)}>No</button>
                  <button style={{...S.btnPri,flex:1}} onClick={saveEditSession}>Yes</button>
                </div>
              </div>
            ) : (
              <>
                <button style={{flex:1,background:"none",border:"none",color:"inherit",textAlign:"left",fontFamily:"inherit",cursor:"pointer",padding:0}}
                  onClick={()=>setOpenSessionId(s.id)}>
                  <div style={{fontWeight:700,fontSize:15}}>{displayDayName(s.dayName, language)}</div>
                  <div style={{color:"#64748b",fontSize:12,marginTop:3}}>{formatDate(s.date)} · {s.logs.length} {language==="de"?"Übungen":"exercises"}</div>
                </button>
                <button style={S.iconBtn} onClick={()=>startEditSession(s)}><Icon d={Icons.edit} size={17} color="#60a5fa" /></button>
                <button style={S.iconBtn} onClick={()=>deleteSession(s.id)}><Icon d={Icons.trash} size={17} color="#ef4444" /></button>
              </>
            )}
          </div>
        ))}
      </>}

      {view==="devices"&&<>
        {devices.length===0&&<div style={S.empty}>{language==="de"?"Noch keine Übungen.":"No exercises yet."}</div>}
        {devices.map(d=>{
          const count=logs.filter(l=>l.deviceId===d.id).length;
          const warn=getProgressWarning(logs,d.id);
          return (
            <button key={d.id} style={{width:"100%",background:"#1e293b",color:"#e2e8f0",
              border:"1px solid #334155",borderRadius:14,padding:14,marginBottom:10,
              cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",
              textAlign:"left",gap:10,fontFamily:"inherit"}}
              onClick={()=>setOpenDeviceId(d.id)}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {d.photo?<img src={d.photo} alt="" style={{width:44,height:44,borderRadius:8,objectFit:"cover"}} />
                  :<div style={{width:44,height:44,borderRadius:8,background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <Icon d={Icons.dumbbell} size={18} color="#475569" /></div>}
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{d.name}</div>
                  <div style={{color:"#64748b",fontSize:12,marginTop:2}}>{d.muscle||t(language,"noMuscleGroup")} · {exerciseTypeLabel(d.exerciseType, language)} · {count} sessions</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {warn&&<Icon d={Icons.warning} size={16} color="#fbbf24" />}
                <Icon d={Icons.play} size={16} color="#60a5fa" />
              </div>
            </button>
          );
        })}
      </>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SETTINGS SCREEN
// ═══════════════════════════════════════════════════════════════
function SettingsScreen({ devices, days, logs, groupPhotos, timerSettings, setTimerSettings, language, setLanguage, onImport }) {
  const [msg, setMsg] = useState(""); const [msgOk, setMsgOk] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [exportJson, setExportJson] = useState(null);
  const [pasteText, setPasteText] = useState("");
  const [setRestInput, setSetRestInput] = useState((timerSettings.setRestSeconds/60).toString().replace(".",","));
  const [exerciseRestInput, setExerciseRestInput] = useState((timerSettings.exerciseRestSeconds/60).toString().replace(".",","));
  const showMsg = (t,ok=false)=>{ setMsg(t); setMsgOk(ok); setTimeout(()=>setMsg(""),4000); };

  useEffect(()=>{ setSetRestInput((timerSettings.setRestSeconds/60).toString().replace(".",",")); }, [timerSettings.setRestSeconds]);
  useEffect(()=>{ setExerciseRestInput((timerSettings.exerciseRestSeconds/60).toString().replace(".",",")); }, [timerSettings.exerciseRestSeconds]);

  const parseMinutes = text => {
    const normalized = String(text).trim().replace(",", ".");
    const min = parseFloat(normalized);
    return Number.isFinite(min) && min >= 0 ? min : 0;
  };
  const saveSetRest = () => setTimerSettings(prev=>({...prev,setRestSeconds:Math.round(parseMinutes(setRestInput)*60)}));
  const saveExerciseRest = () => setTimerSettings(prev=>({...prev,exerciseRestSeconds:Math.round(parseMinutes(exerciseRestInput)*60)}));

  // ── BACKUP ──────────────────────────────────────────────────
  const doExport = () => {
    const payload = {
      version: 2,
      exportedAt: new Date().toISOString(),
      devices,
      days,
      logs,
      groupPhotos,
      timerSettings,
      language,
    };
    const json = JSON.stringify(payload, null, 2);
    try {
      const a = document.createElement("a");
      a.href = "data:application/json;charset=utf-8," + encodeURIComponent(json);
      a.download = `ironlog-backup-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      showMsg("✅ Backup downloaded! Save it to Files / iCloud.", true);
    } catch {
      setExportJson(json);
    }
  };

  const doImportFile = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.devices || !data.days || !data.logs) throw new Error("Invalid");
        onImport(data);
        showMsg(`✅ Restored: ${data.devices.length} ${t(language,"exercises").toLowerCase()}, ${data.days.length} ${t(language,"days").toLowerCase()}, ${data.logs.length} sessions.`, true);
      } catch { showMsg("❌ Invalid backup file."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const doImportPaste = () => {
    try {
      const data = JSON.parse(pasteText.trim());
      if (!data.devices || !data.days || !data.logs) throw new Error("Invalid");
      onImport(data);
      setPasteText("");
      showMsg(`✅ Restored: ${data.devices.length} ${t(language,"exercises").toLowerCase()}, ${data.days.length} ${t(language,"days").toLowerCase()}, ${data.logs.length} sessions.`, true);
    } catch { showMsg("❌ Invalid JSON. Copy the full backup text."); }
  };

  const stats=[
    {label:t(language,"exercises"),value:devices.length,color:"#3b82f6"},
    {label:language==="de"?"Trainingstage":"Training Days",value:days.length,color:"#8b5cf6"},
    {label:"Sessions",value:logs.length,color:"#10b981"},
    {label:language==="de"?"Sätze gesamt":"Total Sets",value:logs.reduce((a,l)=>a+l.sets.length,0),color:"#f59e0b"},
  ];

  return (
    <div style={S.screen}>
      <h2 style={S.title}>{t(language,"settings")}</h2>

      <div style={{...S.block,marginBottom:14}}>
        <div style={{fontSize:15,fontWeight:800,color:"#f1f5f9",marginBottom:10}}>{t(language,"language")}</div>
        <select style={inp} value={language} onChange={e=>setLanguage(e.target.value)}>
          <option value="en">{t(language,"english")}</option>
          <option value="de">{t(language,"german")}</option>
        </select>
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        {stats.map(s=>(
          <div key={s.label} style={{background:"#1e293b",borderRadius:14,padding:"14px 16px",border:"1px solid #334155"}}>
            <div style={{fontSize:30,fontWeight:900,color:s.color}}>{s.value}</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Timer Settings */}
      <div style={{...S.block,marginBottom:14}}>
        <div style={{fontSize:15,fontWeight:800,color:"#f1f5f9",marginBottom:10}}>⏱ {t(language,"restTimerSettings")}</div>
        <label style={S.lbl}>{t(language,"restBetweenSets")}</label>
        <input style={{...inp,marginBottom:10}} type="text" inputMode="decimal"
          value={setRestInput} placeholder="e.g. 1.5"
          onChange={e=>setSetRestInput(e.target.value)} onBlur={saveSetRest} />
        <label style={S.lbl}>{t(language,"restBetweenExercises")}</label>
        <input style={inp} type="text" inputMode="decimal"
          value={exerciseRestInput} placeholder="e.g. 3 or 1.5"
          onChange={e=>setExerciseRestInput(e.target.value)} onBlur={saveExerciseRest} />
        <button style={{...S.btnPri,marginTop:10,background:"#059669"}}
          onClick={()=>{saveSetRest(); saveExerciseRest(); showMsg("✅ " + t(language,"timerSaved"), true);}}>
          {t(language,"saveTimerSettings")}
        </button>
        <div style={{fontSize:12,color:"#64748b",lineHeight:1.6,marginTop:10}}>
          Default: 1.5 min after set, 3 min after exercise. Use 0 to disable.
        </div>
      </div>

      {msg&&<div style={{fontSize:13,padding:"10px 14px",borderRadius:10,marginBottom:14,
        background:msgOk?"#052e16":"#2d1515",color:msgOk?"#4ade80":"#f87171",fontWeight:600}}>{msg}</div>}

      {/* ── EXPORT ── */}
      <div style={{...S.block,marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>📤 {t(language,"exportBackup")}</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:12}}>
          {t(language,"settingsBackupText")}
        </div>
        <button style={{...S.btnPri,background:"#059669"}} onClick={doExport}>
          ⬇️ {t(language,"downloadBackup")}
        </button>
        {exportJson && (
          <div style={{marginTop:12}}>
            <div style={{fontSize:13,color:"#fbbf24",marginBottom:6,fontWeight:600}}>
              ⚠️ Download blocked — copy this text and save it as a .json file:
            </div>
            <textarea readOnly value={exportJson}
              style={{width:"100%",boxSizing:"border-box",height:100,background:"#0f172a",
                border:"1.5px solid #475569",borderRadius:10,color:"#94a3b8",
                fontSize:11,padding:10,fontFamily:"monospace",resize:"vertical"}}
              onClick={e=>e.target.select()} />
            <button style={{...S.btnPri,background:"#475569",marginTop:6,fontSize:13}}
              onClick={()=>{
                navigator.clipboard?.writeText(exportJson)
                  .then(()=>showMsg("✅ Copied to clipboard!", true))
                  .catch(()=>showMsg("Select all text above and copy manually."));
              }}>
              📋 Copy to Clipboard
            </button>
          </div>
        )}
      </div>

      {/* ── IMPORT FILE ── */}
      <div style={{...S.block,marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>📥 {t(language,"restoreFile")}</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:12}}>
          {language==="de"?"Wähle eine zuvor exportierte .json Backup-Datei. Dadurch werden alle aktuellen Daten ersetzt.":"Choose a previously exported .json backup file. This replaces all current data."}
        </div>
        <label style={{display:"flex",alignItems:"center",justifyContent:"center",
          background:"#1d4ed8",borderRadius:12,color:"#fff",fontSize:15,
          fontWeight:700,padding:"14px",cursor:"pointer",fontFamily:"inherit"}}>
          📂 {t(language,"chooseBackupFile")}
          <input type="file" accept=".json,.txt" style={{display:"none"}} onChange={doImportFile} />
        </label>
      </div>

      {/* ── IMPORT PASTE ── */}
      <div style={{...S.block,marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>📋 {t(language,"restorePaste")}</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:10}}>
          {language==="de"?"Füge hier deinen kopierten Backup-JSON-Text ein.":"Paste your previously copied backup JSON text here."}
        </div>
        <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)}
          placeholder={language==="de"?"Backup-JSON hier einfügen...":"Paste backup JSON here..."}
          style={{width:"100%",boxSizing:"border-box",height:90,background:"#0f172a",
            border:"1.5px solid #475569",borderRadius:10,color:"#f1f5f9",
            fontSize:12,padding:10,fontFamily:"monospace",resize:"vertical",outline:"none",marginBottom:8}} />
        <button style={{...S.btnPri,background:"#1d4ed8"}}
          onClick={doImportPaste} disabled={!pasteText.trim()}>
          {t(language,"restoreText")}
        </button>
      </div>

      {/* ── CLEAR ── */}
      <div style={{...S.block,border:"1px solid #7f1d1d",marginBottom:24}}>
        <div style={{fontSize:15,fontWeight:700,color:"#f87171",marginBottom:4}}>🗑️ {t(language,"clearAllData")}</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:12}}>{language==="de"?"Alles dauerhaft löschen. Exportiere vorher ein Backup!":"Permanently delete everything. Export a backup first!"}</div>
        {confirmClear
          ?<div style={{display:"flex",gap:8}}>
            <button style={{...S.btnSec,flex:1}} onClick={()=>setConfirmClear(false)}>{language==="de"?"Abbrechen":"Cancel"}</button>
            <button style={{...S.btnPri,background:"#dc2626",flex:1}}
              onClick={()=>{onImport({devices:[],days:[],logs:[],groupPhotos:{}});setConfirmClear(false);showMsg(t(language,"allDataCleared"));}}>
              {language==="de"?"Ja, alles löschen":"Yes, Delete All"}
            </button>
          </div>
          :<button style={{...S.btnPri,background:"#7f1d1d",color:"#fca5a5"}} onClick={()=>setConfirmClear(true)}>
            {t(language,"clearAllData")}
          </button>
        }
      </div>
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════
// ROOT
// ═══════════════════════════════════════════════════════════════
function App() {
  const [ready, setReady] = useState(false);
  const [entered, setEnteredState] = useState(false);
  const [tab, setTab] = useState("days");
  const [devices, setDevicesState] = useState([]);
  const [dayTemplates, setDayTemplatesState] = useState([]);
  const [logs, setLogsState] = useState([]);
  const [groupPhotos, setGroupPhotosState] = useState({});
  const [timerSettings, setTimerSettingsState] = useState({ setRestSeconds: 90, exerciseRestSeconds: 180 });
  const [language, setLanguageState] = useState("en");
  const [session, setSession] = useState(null);
  const [confirm, setConfirm] = useState(null);

  useEffect(()=>{
    (async()=>{
      const [d,dt,l,gp,ts,lang,enteredSaved]=await Promise.all([
        loadData("gym-devices"), loadData("gym-day-templates"), loadData("gym-logs"), loadData("gym-group-photos"), loadData("gym-timer-settings"), loadData("gym-language"), loadData("gym-entered"),
      ]);
      const loadedLanguage = lang === "de" ? "de" : "en";
      setLanguageState(loadedLanguage);
      const loadedDevices = withDefaultDevicePhotos(d, loadedLanguage);
      setDevicesState(loadedDevices);
      saveData("gym-devices", loadedDevices);
      if (dt) setDayTemplatesState(uniqueCustomDays(dt));
      if (l) setLogsState(l);
      setGroupPhotosState({...DEFAULT_GROUP_PHOTOS, ...(gp || {})});
      if (ts) setTimerSettingsState({ setRestSeconds: Number(ts.setRestSeconds) || 90, exerciseRestSeconds: Number(ts.exerciseRestSeconds) || 180 });
      setEnteredState(enteredSaved === true);
      setReady(true);
    })();
  },[]);

  const setEntered = value => {
    setEnteredState(value);
    saveData("gym-entered", value);
  };

  // Persisted setters
  const setDevices = updater => setDevicesState(prev=>{
    const next=typeof updater==="function"?updater(prev):updater;
    saveData("gym-devices",next); return next;
  });
  const setDayTemplates = updater => setDayTemplatesState(prev=>{
    const raw=typeof updater==="function"?updater(prev):updater;
    const next=uniqueCustomDays(raw);
    saveData("gym-day-templates",next); return next;
  });
  const setLogs = updater => setLogsState(prev=>{
    const next=typeof updater==="function"?updater(prev):updater;
    saveData("gym-logs",next); return next;
  });

  const setGroupPhotos = updater => setGroupPhotosState(prev=>{
    const next=typeof updater==="function"?updater(prev):updater;
    saveData("gym-group-photos",next); return next;
  });

  const setTimerSettings = updater => setTimerSettingsState(prev=>{
    const next=typeof updater==="function"?updater(prev):updater;
    saveData("gym-timer-settings",next); return next;
  });

  const setLanguage = lang => {
    const next = lang === "de" ? "de" : "en";
    setLanguageState(next);
    saveData("gym-language", next);
    setDevicesState(prev => {
      const updated = withDefaultDevicePhotos(prev, next);
      saveData("gym-devices", updated);
      return updated;
    });
  };

  const requestConfirm = (message,action) => setConfirm({message,action});
  const runConfirmed = () => { confirm?.action?.(); setConfirm(null); };
  const handleImport = ({devices,days,logs,groupPhotos: gp,timerSettings: ts,language: importedLanguage})=>{
    const importLanguage = importedLanguage === "de" || importedLanguage === "en" ? importedLanguage : language;
    setLanguageState(importLanguage);
    saveData("gym-language", importLanguage);
    setDevices(withDefaultDevicePhotos(devices, importLanguage)); setDayTemplates(days); setLogs(logs);
    setGroupPhotos({...DEFAULT_GROUP_PHOTOS, ...(gp || {})});
    if (ts) setTimerSettings(ts);
  };

  if (!ready) return <div style={{...S.phone,alignItems:"center",justifyContent:"center"}}>
    <div style={{color:"#475569",fontSize:16}}>Loading…</div></div>;

  if (!entered) return (
    <div style={S.phone}>
      <SplashScreen onStart={()=>setEntered(true)} />
    </div>
  );

  if (session) return (
    <div style={S.phone}>
      <SessionScreen session={session} setSession={setSession}
        devices={devices} setDevices={setDevices}
        groupPhotos={groupPhotos}
        logs={logs} setLogs={setLogs} timerSettings={timerSettings} language={language} onEnd={()=>setSession(null)} />
      <ConfirmDialog confirm={confirm} onCancel={()=>setConfirm(null)} onConfirm={runConfirmed} />
    </div>
  );

  const NAV = [
    {key:"days",    icon:Icons.calendar, label:t(language,"days")},
    {key:"devices", icon:Icons.dumbbell, label:t(language,"exercises")},
    {key:"history", icon:Icons.trend,    label:t(language,"history")},
    {key:"settings",icon:Icons.save,     label:t(language,"settings")},
  ];

  return (
    <div style={S.phone}>
      {tab==="days"     && <DaySetup dayTemplates={dayTemplates} setDayTemplates={setDayTemplates}
          language={language}
          onStart={setSession}
          onRequestDeleteDays={()=>requestConfirm(t(language,"deleteDaysConfirm"),()=>setDayTemplates([]))} />}
      {tab==="devices"  && <DevicesScreen devices={devices} setDevices={setDevices}
          language={language}
          groupPhotos={groupPhotos} setGroupPhotos={setGroupPhotos}
          onRequestDeleteAll={()=>requestConfirm(t(language,"deleteExercisesConfirm"),()=>setDevices([]))} />}
      {tab==="history"  && <HistoryScreen logs={logs} devices={devices} setLogs={setLogs}
          language={language}
          onResumeSession={setSession}
          onRequestDeleteAll={()=>requestConfirm(t(language,"deleteHistoryConfirm"),()=>setLogs([]))} />}
      {tab==="settings" && <SettingsScreen devices={devices} days={dayTemplates} logs={logs} groupPhotos={groupPhotos} timerSettings={timerSettings} setTimerSettings={setTimerSettings} language={language} setLanguage={setLanguage} onImport={handleImport} />}

      <ConfirmDialog confirm={confirm} onCancel={()=>setConfirm(null)} onConfirm={runConfirmed} />

      <nav style={S.nav}>
        {NAV.map(({key,icon,label})=>(
          <button key={key} style={{...S.navBtn,color:tab===key?"#3b82f6":"#64748b"}} onClick={()=>setTab(key)}>
            <Icon d={icon} size={22} color={tab===key?"#3b82f6":"#64748b"} />
            <span style={{fontSize:10,marginTop:3,fontWeight:tab===key?700:400}}>{label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}
